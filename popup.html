<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CookieCut</title>
  <style>
    :root {
      --bg:         #FFFFFF;
      --surface:    #F8F8F8;
      --border:     #F0F0F0;
      --text:       #1A1A1A;
      --text2:      #555555;
      --text3:      #AAAAAA;
      --amber:      #E8A020;
      --amber-light:#FEF3E2;
      --amber-text: #92580A;
      --green:      #2E9E6B;
      --red:        #E05555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--amber-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 14px; font-weight: 700; color: var(--text);
    }

    .brand-sub {
      font-size: 11px; color: var(--text3); margin-top: 1px;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); margin-left: auto; flex-shrink: 0;
    }

    /* ── Stat ── */
    .stat-wrap {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }

    .stat-num {
      font-size: 42px; font-weight: 800;
      color: var(--amber); letter-spacing: -2px; line-height: 1;
    }

    .stat-label {
      font-size: 12px; color: var(--text3); line-height: 1.5;
    }

    /* ── Activity ── */
    .section-title {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 10px 16px 6px;
    }

    .activity-list {
      list-style: none;
      max-height: 150px; overflow-y: auto;
    }

    .activity-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
    }

    .item-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--amber); flex-shrink: 0;
    }

    .item-host {
      flex: 1; font-size: 12px; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .item-tag {
      font-size: 10px; font-weight: 700;
      color: var(--amber-text); background: var(--amber-light);
      padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
    }

    .empty-state {
      padding: 20px 16px; text-align: center;
      color: var(--text3); font-size: 12px; line-height: 1.6;
    }

    /* ── Footer ── */
    footer {
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .footer-status { font-size: 11px; color: var(--text3); }
    .footer-status strong { color: var(--green); font-weight: 600; }

    .reset-btn {
      font-size: 11px; color: var(--text3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="18" fill="#E8A020"/>
        <circle cx="20" cy="22" r="2.5" fill="#C47A0A"/>
        <circle cx="29" cy="19" r="1.8" fill="#C47A0A"/>
        <circle cx="23" cy="30" r="2"   fill="#C47A0A"/>
        <circle cx="31" cy="29" r="2.5" fill="#C47A0A"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">CookieCut</div>
      <div class="brand-sub">Blocking non-essential cookies</div>
    </div>
    <div class="status-dot"></div>
  </header>

  <div class="stat-wrap">
    <div class="stat-num" id="counter">0</div>
    <div class="stat-label">cookies declined<br>this session</div>
  </div>

  <div class="section-title">Recent</div>
  <ul class="activity-list" id="activity-list">
    <li style="border:none">
      <div class="empty-state">Browse normally — CookieCut handles the banners.</div>
    </li>
  </ul>

  <footer>
    <div class="footer-status">Status: <strong>active</strong></div>
    <button class="reset-btn" id="reset-btn">Reset stats</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
